name: 'build-test'
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build: # make sure build/ci work properly
    strategy:
      matrix:
        os: [ubuntu-slim, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # octocov pushes the coverage badge to the default branch
      pull-requests: write # octocov posts the coverage report comment
      actions: read # octocov reads previous reports from artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies and run tests
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run test:coverage
      - name: Report coverage with octocov
        if: matrix.os == 'ubuntu-slim'
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  build-on-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies and run tests
        run: |
          npm ci
          npm run test

  test: # make sure the action works on a clean machine without building
    strategy:
      matrix:
        os: [ubuntu-slim, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Run npm audit action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: npm audit run by test job
          create_pr_comments: false
          create_issues: false
          production_flag: true
      - name: Run npm audit action in testdata workdir
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: __tests__/testdata/workdir
          create_pr_comments: false
          create_issues: false
          fail_on_vulnerabilities: false
          production_flag: true

  test-on-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Run npm audit action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: npm audit run by test job
          create_pr_comments: false
          create_issues: false
          production_flag: true
      - name: Run npm audit action in testdata workdir
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: __tests__/testdata/workdir
          create_pr_comments: false
          create_issues: false
          fail_on_vulnerabilities: false
          production_flag: true
