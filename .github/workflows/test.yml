name: 'build-test'
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build: # make sure build/ci work properly
    strategy:
      matrix:
        node: [24]
        os: [ubuntu-slim, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies and run tests
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run test:coverage
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-slim'
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-on-windows:
    strategy:
      matrix:
        node: [24]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies and run tests
        run: |
          npm ci
          npm run test

  test: # make sure the action works on a clean machine without building
    strategy:
      matrix:
        node: [24]
        os: [ubuntu-slim, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Run npm audit action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: npm audit run by test job
          create_pr_comments: false
          create_issues: false
          production_flag: true
      - name: Run npm audit action in testdata workdir
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: __tests__/testdata/workdir
          create_pr_comments: false
          create_issues: false
          fail_on_vulnerabilities: false
          production_flag: true

  test-on-windows:
    strategy:
      matrix:
        node: [24]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Run npm audit action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: npm audit run by test job
          create_pr_comments: false
          create_issues: false
          production_flag: true
      - name: Run npm audit action in testdata workdir
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: __tests__/testdata/workdir
          create_pr_comments: false
          create_issues: false
          fail_on_vulnerabilities: false
          production_flag: true
