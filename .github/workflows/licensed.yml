# This workflow checks the statuses of cached dependencies used in this
# action with the help of the Licensed tool. It runs licensee/licensed-ci,
# which updates the cached license metadata (`licensed cache`), pushes any
# changes back to the triggering branch, and verifies the result
# (`licensed status`). See: https://github.com/licensee/licensed-ci

name: Licensed

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

# `contents: write` is required so licensed-ci can push license cache
# updates. Setting it explicitly also grants write access on
# Dependabot-triggered runs, which default to a read-only token.
permissions:
  contents: write

jobs:
  licensed:
    name: Check Licenses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # licensed-ci pushes through its own tokenized remote, so the
          # checkout credentials are not needed.
          persist-credentials: false

      # npm caching is intentionally not enabled here: this workflow pushes
      # commits, so a poisoned cache could end up in the repository. The
      # zizmor ignore is for a false positive (caching is already off).
      - name: Setup Node.js # zizmor: ignore[cache-poisoning]
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Setup Ruby
        id: setup-ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ruby

      - uses: licensee/setup-licensed@0d52e575b3258417672be0dff2f115d7db8771d8 # v1.3.2
        with:
          version: 4.x
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run licensed-ci
        id: licensed-ci
        uses: licensee/licensed-ci@f1f6507544a9db25b0f4730230bfdf67a9c1bc90 # v1.12.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Signal to Dependabot that its PRs are still safe to operate on
          # after licensed-ci pushes a license update commit.
          dependabot_skip: 'true'
