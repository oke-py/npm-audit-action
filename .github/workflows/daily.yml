name: daily scan

on:
  schedule:
    - cron: '0 20 * * *'

permissions: {}

jobs:
  scan:
    name: npm audit
    permissions:
      contents: read
      issues: write
    strategy:
      # Serialized so that concurrent jobs cannot race past the dedupe_issues
      # check and file duplicate issues
      max-parallel: 1
      matrix:
        os: [ubuntu-slim, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install dependencies
        run: npm ci
      # Intentionally unpinned: dogfoods the latest released major tag of
      # this repository's own action.
      - uses: oke-py/npm-audit-action@v5 # zizmor: ignore[unpinned-uses]
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_assignees: oke-py
          issue_labels: vulnerability
          dedupe_issues: true
          dedupe_comments: true
          production_flag: true
          report_format: markdown

  scan-on-windows:
    name: npm audit (windows)
    # Runs after the serialized scan job so that all three runs check the
    # existing issue sequentially instead of racing to create it
    needs: scan
    permissions:
      contents: read
      issues: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install dependencies
        run: npm ci
      # Intentionally unpinned: dogfoods the latest released major tag of
      # this repository's own action.
      - uses: oke-py/npm-audit-action@v5 # zizmor: ignore[unpinned-uses]
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_assignees: oke-py
          issue_labels: vulnerability
          dedupe_issues: true
          dedupe_comments: true
          production_flag: true
          report_format: markdown
